name = "weetwiz-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [{ pattern = "weetwiz-api.weetwiz.com", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "weetwiz-db"
database_id = "3e74479e-067c-4a2c-a7cb-4b95462aa557"

[vars]
EMAIL_FROM = "WeetWiz <noreply@weetwiz.com>"
APP_URL = "https://weetwiz-api.weetwiz.com"

# Secrets — set via: wrangler secret put <NAME>
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_ID
# RESEND_API_KEY

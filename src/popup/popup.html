<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0f172a;
      --bg-stripe: #090f1f;
      --bg-input: #1e293b;
      --bg-btn-hover: #1e293b;
      --border: #1e293b;
      --border-input: #334155;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #475569;
      --text-item: #94a3b8;
      --text-strength: #86efac;
      --text-no-item: #334155;
      --logo: #38bdf8;
    }
    body.light {
      --bg: #f8fafc;
      --bg-stripe: #f1f5f9;
      --bg-input: #ffffff;
      --bg-btn-hover: #e2e8f0;
      --border: #e2e8f0;
      --border-input: #cbd5e1;
      --text: #0f172a;
      --text-muted: #94a3b8;
      --text-dim: #94a3b8;
      --text-item: #475569;
      --text-strength: #16a34a;
      --text-no-item: #cbd5e1;
      --logo: #0369a1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      max-height: 580px;
      display: flex;
      flex-direction: row;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Left stripe ── */
    .left-stripe {
      width: 36px;
      background: var(--bg-stripe);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 8px;
      flex-shrink: 0;
    }
    .stripe-btn {
      width: 26px; height: 26px;
      border-radius: 5px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-dim);
      transition: color 0.15s, background 0.15s;
    }
    .stripe-btn:hover { color: var(--text-muted); background: var(--bg-btn-hover); }
    .stripe-btn.power-on  { color: #4ade80; }
    .stripe-btn.power-off { color: #f87171; }
    #themeBtn { color: #4ade80; }
    .stripe-spacer { flex: 1; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    #content { overflow-y: auto; flex: 1; }

    /* ── Header ── */
    .header {
      padding: 8px 14px 6px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .header-sub {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-sub-title {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .version { font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .logo { font-weight: 700; font-size: 15px; color: var(--logo); letter-spacing: -0.3px; }
    .domain { color: var(--logo); font-size: 11px; font-weight: 600; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; }

    /* ── Score row ── */
    .score-row {
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 3px solid currentColor;
    }
    .score-num { font-size: 26px; font-weight: 700; line-height: 1; }
    .score-max { font-size: 10px; color: var(--text-muted); }
    .score-meta { flex: 1; min-width: 0; }
    .score-time { text-align: right; font-size: 10px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; line-height: 1.6; }
    .risk-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .score-label { font-size: 11px; font-weight: 700; color: var(--text-muted); }

    .risk-very-low  { background: #0d2b1e; color: #4ade80; border: 1px solid #166534; }
    .risk-low       { background: #0c1f3f; color: #60a5fa; border: 1px solid #1e40af; }
    .risk-medium    { background: #291800; color: #fbbf24; border: 1px solid #78350f; }
    .risk-high      { background: #2d0f0f; color: #f87171; border: 1px solid #7f1d1d; }
    .risk-very-high { background: #200000; color: #ef4444; border: 1px solid #6b0000; }

    body.light .risk-very-low  { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    body.light .risk-low       { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
    body.light .risk-medium    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    body.light .risk-high      { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    body.light .risk-very-high { background: #fce7e7; color: #7f1d1d; border-color: #fca5a5; }

    .color-very-low  { color: #4ade80; border-color: #4ade80; }
    .color-low       { color: #60a5fa; border-color: #60a5fa; }
    .color-medium    { color: #fbbf24; border-color: #fbbf24; }
    .color-high      { color: #f87171; border-color: #f87171; }
    .color-very-high { color: #ef4444; border-color: #ef4444; }

    /* ── Sections ── */
    .section { border-top: 1px solid var(--border); padding: 8px 14px 10px; }
    .section-title {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-dim); margin-bottom: 5px;
    }
    .item { padding: 2px 0; font-size: 12px; line-height: 1.45; color: var(--text-item); }
    .item.strength { color: var(--text-strength); }
    .no-items { font-size: 12px; color: var(--text-no-item); font-style: italic; }
    .ip-link { color: #38bdf8; text-decoration: none; cursor: pointer; }
    .ip-link:hover { text-decoration: underline; }
    body.light .ip-link { color: #0369a1; }

    /* ── State messages ── */
    .state-msg { padding: 28px 14px; text-align: center; color: var(--text-dim); font-size: 13px; }
    .state-msg .icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Settings ── */
    .settings { border-top: 1px solid var(--border); padding: 10px 14px; }
    .settings label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .settings input {
      width: 100%; padding: 6px 8px;
      background: var(--bg-input); border: 1px solid var(--border-input);
      border-radius: 4px; color: var(--text); font-size: 12px; outline: none;
    }
    .settings input:focus { border-color: var(--logo); }
    .save-btn {
      margin-top: 6px; padding: 5px 14px;
      background: #0369a1; border: none; border-radius: 4px;
      color: white; font-size: 12px; cursor: pointer;
    }
    .save-btn:hover { background: #0284c7; }
    .saved-msg { font-size: 11px; color: #4ade80; margin-top: 4px; display: none; }
    .settings-collapsed { border-top: 1px solid var(--border); padding: 8px 14px; }
    .settings-toggle { font-size: 11px; color: var(--text-dim); cursor: pointer; user-select: none; }
    .settings-toggle:hover { color: var(--text-muted); }
    .settings-body { margin-top: 8px; }
    .settings-body input {
      width: 100%; padding: 6px 8px;
      background: var(--bg-input); border: 1px solid var(--border-input);
      border-radius: 4px; color: var(--text); font-size: 12px; outline: none;
    }
    .settings-body input:focus { border-color: var(--logo); }

    /* ── Onboarding ── */
    .onboarding { padding: 20px 14px 4px; }
    .onboarding-icon { font-size: 30px; text-align: center; margin-bottom: 8px; }
    .onboarding-title { font-size: 14px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 6px; }
    .onboarding-desc { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.5; margin-bottom: 14px; }
    .onboarding-form { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .onboarding-form input { padding: 6px 8px; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 4px; color: var(--text); font-size: 12px; outline: none; }
    .onboarding-form input:focus { border-color: var(--logo); }
    .onboarding-divider { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; padding-bottom: 2px; border-top: 1px solid var(--border); padding-top: 10px; }
    .onboarding-msg { font-size: 11px; margin-top: 2px; display: none; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="left-stripe">
    <button class="stripe-btn" id="powerBtn" title="Toggle scanning">⏻</button>
    <div class="stripe-spacer"></div>
    <button class="stripe-btn" id="themeBtn" title="Toggle light/dark">◑</button>
  </div>
  <div class="main-content">
    <div class="header">
      <div class="header-top">
        <span class="logo">WeetWiz</span>
        <span class="version">V1.0.9</span>
      </div>
      <div class="header-sub">
        <span class="header-sub-title">Cybersecurity Vulnerabilities</span>
        <span class="domain" id="domain"></span>
      </div>
    </div>
    <div id="content">
      <div class="state-msg">
        <div class="icon">⏳</div>
        Loading…
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
